<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ادم شوب - إكمال الملف الشخصي">
    <title>ادم شوب | إكمال الملف الشخصي</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .auth-page::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        @keyframes rotateBg { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .auth-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 12px;
        }
        .auth-logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #f5d060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }
        .profile-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .profile-avatar-upload {
            text-align: center;
            margin-bottom: 28px;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 3px dashed rgba(212,175,55,0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .avatar-circle:hover {
            border-color: #d4af37;
            background: rgba(212,175,55,0.1);
        }
        .avatar-circle span {
            font-size: 2.5rem;
            color: rgba(255,255,255,0.3);
        }
        .avatar-circle input {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .form-group select option { background: #1a1a2e; color: #fff; }
        .map-picker {
            border: 1px dashed rgba(212,175,55,0.3);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.03);
        }
        .map-picker:hover {
            border-color: #d4af37;
            background: rgba(212,175,55,0.05);
        }
        .map-picker .map-icon { font-size: 1.5rem; margin-bottom: 6px; }
        .map-picker p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin: 0; }
        .map-picker .location-status { color: #4caf50; font-size: 0.8rem; margin-top: 4px; }
        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37, #b8962e);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .btn-save:hover {
            background: linear-gradient(135deg, #e6c248, #d4af37);
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.3);
        }
        .map-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .map-modal.active { display: flex; }
        .map-modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 600px;
        }
        .map-modal-content iframe {
            width: 100%;
            height: 350px;
            border-radius: 12px;
            border: none;
        }
        .map-modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: flex-end;
        }
        .map-modal-actions button {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-confirm-map {
            background: #d4af37;
            color: #fff;
        }
        .btn-cancel-map {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>ادم شوب</h1>
            </div>
            <p class="profile-subtitle" data-i18n="complete_profile_title">أكمل ملفك الشخصي للمتابعة</p>

            <div class="profile-avatar-upload">
                <div class="avatar-circle" id="avatarCircle">
                    <span>&#128100;</span>
                    <input type="file" id="avatarInput" accept="image/*">
                </div>
            </div>

            <form id="profileForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName" data-i18n="full_name">الاسم الكامل</label>
                        <input type="text" id="fullName" data-i18n-placeholder="full_name_placeholder" placeholder="الاسم الكامل" value="أحمد محمد" required>
                    </div>
                    <div class="form-group">
                        <label for="phone" data-i18n="phone">رقم الهاتف</label>
                        <input type="tel" id="phone" data-i18n-placeholder="phone_placeholder" placeholder="+218 91 234 5678" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="backupPhone" data-i18n="backup_phone">رقم هاتف احتياطي</label>
                        <input type="tel" id="backupPhone" data-i18n-placeholder="backup_phone_placeholder" placeholder="+218 92 345 6789">
                    </div>
                    <div class="form-group">
                        <label for="email" data-i18n="email">البريد الإلكتروني</label>
                        <input type="email" id="email" value="ahmed@gmail.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="city" data-i18n="city">المدينة</label>
                    <select id="city" required>
                        <option value="" data-i18n="select_city">اختر مدينتك</option>
                        <option value="tripoli" data-i18n="city_tripoli">طرابلس</option>
                        <option value="benghazi" data-i18n="city_benghazi">بنغازي</option>
                        <option value="misrata" data-i18n="city_misrata">مصراتة</option>
                        <option value="tarhuna" data-i18n="city_tarhuna">ترهونة</option>
                        <option value="alzawiya" data-i18n="city_alzawiya">الزاوية</option>
                        <option value="syrte" data-i18n="city_syrte">سرت</option>
                        <option value="derna" data-i18n="city_derna">درنة</option>
                        <option value="tobruk" data-i18n="tobruk">توبرق</option>
                        <option value="sabha" data-i18n="city_sabha">سبها</option>
                        <option value="other" data-i18n="city_other">أخرى</option>
                    </select>
                </div>

                <div class="form-group">
                    <label data-i18n="location">الموقع على الخريطة</label>
                    <div class="map-picker" id="mapPicker" onclick="openMapModal()">
                        <div class="map-icon">&#128205;</div>
                        <p data-i18n="pick_location">اضغط لاختيار موقعك على الخريطة</p>
                        <div class="location-status" id="locationStatus" style="display:none;" data-i18n="location_selected">تم تحديد الموقع ✓</div>
                    </div>
                </div>

                <button type="submit" class="btn-save" data-i18n="save_continue">حفظ والمتابعة</button>
            </form>
        </div>
    </div>

    <div class="map-modal" id="mapModal">
        <div class="map-modal-content">
            <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=10.0,30.0,25.0,34.0&layer=mapnik" loading="lazy"></iframe>
            <div class="map-modal-actions">
                <button class="btn-cancel-map" onclick="closeMapModal()" data-i18n="cancel">إلغاء</button>
                <button class="btn-confirm-map" onclick="confirmLocation()" data-i18n="confirm_location">تأكيد الموقع</button>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/i18n.js"></script>
    <script>
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const circle = document.getElementById('avatarCircle');
                    circle.innerHTML = '<img src="' + ev.target.result + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
                };
                reader.readAsDataURL(file);
            }
        });

        function openMapModal() {
            document.getElementById('mapModal').classList.add('active');
        }

        function closeMapModal() {
            document.getElementById('mapModal').classList.remove('active');
        }

        function confirmLocation() {
            document.getElementById('locationStatus').style.display = 'block';
            closeMapModal();
        }

        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>

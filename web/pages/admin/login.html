<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ادم شوب - لوحة الإدارة">
    <title>ادم شوب | دخول الإدارة</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .auth-page {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a0a12, #1a1a2e, #16213e); padding: 20px;
            position: relative; overflow: hidden;
        }
        .auth-page::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(244,67,54,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(33,150,243,0.03) 0%, transparent 50%);
        }
        .auth-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            padding: 48px 40px; width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; z-index: 1;
        }
        .admin-badge { text-align: center; margin-bottom: 24px; }
        .admin-badge .shield { font-size: 3rem; margin-bottom: 12px; }
        .admin-badge h1 { font-size: 1.4rem; color: #f44336; font-weight: 700; }
        .admin-badge .subtitle { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            color: #fff; font-size: 1rem; box-sizing: border-box; transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #f44336; background: rgba(255,255,255,0.06); }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .btn-access {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #f44336, #c62828);
            color: #fff; border: none; border-radius: 12px; font-size: 1.05rem;
            font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 8px;
        }
        .btn-access:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(244,67,54,0.3); }
        .warning-text {
            text-align: center; margin-top: 24px; padding: 16px;
            background: rgba(244,67,54,0.06); border: 1px solid rgba(244,67,54,0.12);
            border-radius: 10px; color: rgba(255,255,255,0.4); font-size: 0.78rem; line-height: 1.6;
        }
        .warning-text strong { color: #f44336; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="admin-badge">
                <div class="shield">&#128737;</div>
                <h1 data-i18n="admin_panel">لوحة الإدارة</h1>
                <p class="subtitle" data-i18n="admin_subtitle">ادم شوب - الوصول المحظور</p>
            </div>

            <form id="adminLoginForm" novalidate>
                <div class="form-group">
                    <label for="email" data-i18n="email">البريد الإلكتروني</label>
                    <input type="email" id="email" data-i18n-placeholder="admin_email_placeholder" placeholder="admin@adamshop.ly" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="password">كلمة المرور</label>
                    <input type="password" id="password" data-i18n-placeholder="admin_password_placeholder" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-access" data-i18n="access">دخول</button>
            </form>

            <div class="warning-text">
                <strong data-i18n="warning">⚠ تحذير:</strong>
                <span data-i18n="unauthorized_warning">هذا区域 محظور. أي محاولة وصول غير مصرح بها ستُسجَّل وتُبلَّغ للجهات المختصة.</span>
            </div>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/i18n.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email && password) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="دخول الإدارة - ADAM SHOP Marketplace">
  <title>دخول الإدارة | ADAM SHOP Marketplace</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="recaptcha-gate" id="recaptchaGate">
  <div class="recaptcha-box">
    <div class="rc-crown">👑</div>
    <h2><span class="gold">ADAM SHOP</span> Admin</h2>
    <p data-i18n="captcha.subtitle">يرجى التحقق أنك لست روبوت للدخول إلى لوحة الإدارة</p>
    <label class="rc-check"><input type="checkbox" id="recaptchaCheck"><span data-i18n="captcha.label">لست روبوت</span></label><br>
    <button class="btn btn-gold" id="recaptchaSubmit" data-i18n="captcha.verify">تحقق والدخول</button>
  </div>
</div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="crown">👑</div>
      <h2><span>ADAM SHOP</span> Admin</h2>
    </div>
    <h3 class="auth-title">لوحة تحكم الإدارة</h3>

    <form>
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" class="form-input" placeholder="admin@ADAM SHOP.com">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-input" placeholder="••••••••">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label class="form-check"><input type="checkbox"><span>تذكرني</span></label>
        <a href="#" class="text-sm text-gold">نسيت كلمة المرور؟</a>
      </div>
      <button type="submit" class="btn btn-gold btn-block btn-lg">🔒 دخول الإدارة</button>
    </form>

    <div class="auth-footer" style="margin-top:16px">
      <a href="../login.html">العودة لتسجيل الدخول العادي</a>
    </div>
  </div>
</div>

<script src="../../js/utils.js"></script>
<script src="../../js/i18n.js"></script>
<script src="../../js/theme.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/navbar.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ادم شوب - إعدادات المتجر">
    <title>ادم شوب | إعدادات المتجر</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f0f1a;color:#e0e0e0;display:flex;min-height:100vh;}
        .sidebar{width:260px;background:linear-gradient(180deg,#141428,#1a1a35);border-left:1px solid rgba(255,255,255,0.06);padding:24px 0;position:fixed;top:0;right:0;bottom:0;overflow-y:auto;z-index:100;}
        .sidebar-logo{text-align:center;padding:0 20px 28px;border-bottom:1px solid rgba(255,255,255,0.06);}
        .sidebar-logo h2{font-size:1.6rem;background:linear-gradient(135deg,#d4af37,#f5d060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .sidebar-logo small{color:rgba(255,255,255,0.4);font-size:0.75rem;}
        .sidebar-nav{padding:16px 0;}
        .sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.9rem;transition:all 0.3s;border-right:3px solid transparent;}
        .sidebar-nav a:hover{background:rgba(255,255,255,0.04);color:#fff;}
        .sidebar-nav a.active{background:rgba(212,175,55,0.1);color:#d4af37;border-right-color:#d4af37;}
        .sidebar-nav a .icon{font-size:1.2rem;width:24px;text-align:center;}
        .main-content{margin-right:260px;flex:1;padding:24px 32px;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
        .top-bar h1{font-size:1.6rem;color:#fff;}
        .form-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:32px;margin-bottom:20px;}
        .form-card h3{color:#d4af37;font-size:1.1rem;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06);}
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;color:rgba(255,255,255,0.7);font-size:0.85rem;margin-bottom:8px;font-weight:500;}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:0.9rem;transition:all 0.3s;font-family:inherit;}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#d4af37;}
        .form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,0.3);}
        .form-group select option{background:#1a1a2e;}
        .form-group textarea{min-height:100px;resize:vertical;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .upload-area{border:2px dashed rgba(212,175,55,0.3);border-radius:16px;padding:32px;text-align:center;cursor:pointer;transition:all 0.3s;}
        .upload-area:hover{border-color:#d4af37;}
        .upload-area .upload-icon{font-size:2.5rem;margin-bottom:8px;}
        .upload-area p{color:rgba(255,255,255,0.4);font-size:0.85rem;}
        .upload-area input{display:none;}
        .logo-preview{width:80px;height:80px;border-radius:16px;background:rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:12px;}
        .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
        .toggle-row:last-child{border-bottom:none;}
        .toggle-info h4{font-size:0.95rem;color:#fff;margin-bottom:4px;}
        .toggle-info p{font-size:0.8rem;color:rgba(255,255,255,0.4);}
        .toggle-switch{position:relative;width:48px;height:26px;cursor:pointer;}
        .toggle-switch input{display:none;}
        .toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:13px;transition:0.3s;}
        .toggle-slider::before{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:0.3s;}
        .toggle-switch input:checked+.toggle-slider{background:#d4af37;}
        .toggle-switch input:checked+.toggle-slider::before{left:25px;}
        .map-placeholder{height:200px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);cursor:pointer;}
        .btn-save{padding:14px 40px;background:linear-gradient(135deg,#d4af37,#b8962e);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;}
        .btn-save:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(212,175,55,0.3);}
        @media(max-width:768px){.sidebar{display:none;}.main-content{margin-right:0;}.form-row{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><h2>ادم شوب</h2><small data-i18n="seller_panel">لوحة البائع</small></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"><span class="icon">&#127968;</span><span data-i18n="nav_dashboard">لوحة التحكم</span></a>
            <a href="products.html"><span class="icon">&#128230;</span><span data-i18n="nav_products">المنتجات</span></a>
            <a href="orders.html"><span class="icon">&#128196;</span><span data-i18n="nav_orders">الطلبات</span></a>
            <a href="coupons.html"><span class="icon">&#127915;</span><span data-i18n="nav_coupons">الكوبونات</span></a>
            <a href="analytics.html"><span class="icon">&#128200;</span><span data-i18n="nav_analytics">التحليلات</span></a>
            <a href="store-settings.html" class="active"><span class="icon">&#9881;</span><span data-i18n="nav_store_settings">إعدادات المتجر</span></a>
            <a href="subscription.html"><span class="icon">&#128179;</span><span data-i18n="nav_subscription">الاشتراك</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <h1 data-i18n="store_settings">إعدادات المتجر</h1>
        </div>

        <form id="storeSettingsForm">
            <div class="form-card">
                <h3 data-i18n="store_identity">هوية المتجر</h3>
                <div class="form-group">
                    <label data-i18n="store_logo">شعار المتجر</label>
                    <div class="logo-preview">&#127978;</div>
                    <div class="upload-area" id="logoUpload">
                        <div class="upload-icon">&#128247;</div>
                        <p data-i18n="upload_logo">اضغط لرفع شعار المتجر</p>
                        <input type="file" accept="image/*" id="logoInput">
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="store_name">اسم المتجر</label>
                    <input type="text" value="متجر أحمد للإلكترونيات" data-i18n-placeholder="store_name_placeholder" placeholder="أدخل اسم المتجر" required>
                </div>
                <div class="form-group">
                    <label data-i18n="store_description">وصف المتجر</label>
                    <textarea data-i18n-placeholder="store_desc_placeholder" placeholder="وصف مختصر عن متجرك...">متجر متخصص في بيع الأجهزة الإلكترونية والهواتف الذكية بأفضل الأسعار في ليبيا.</textarea>
                </div>
            </div>

            <div class="form-card">
                <h3 data-i18n="contact_info">معلومات التواصل</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="phone">رقم الهاتف</label>
                        <input type="tel" value="+218 91 234 5678">
                    </div>
                    <div class="form-group">
                        <label data-i18n="email">البريد الإلكتروني</label>
                        <input type="email" value="store@ahmed.ly">
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="city">المدينة</label>
                    <select>
                        <option value="tripoli" data-i18n="city_tripoli" selected>طرابلس</option>
                        <option value="benghazi" data-i18n="city_benghazi">بنغازي</option>
                        <option value="misrata" data-i18n="city_misrata">مصراتة</option>
                        <option value="tarhuna" data-i18n="city_tarhuna">ترهونة</option>
                        <option value="alzawiya" data-i18n="city_alzawiya">الزاوية</option>
                        <option value="syrte" data-i18n="city_syrte">سرت</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="store_location">موقع المتجر على الخريطة</label>
                    <div class="map-placeholder" onclick="alert('فتح خريطة Google Maps')">
                        <span data-i18n="pick_location">&#128205; اضغط لاختيار الموقع</span>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h3 data-i18n="preferences">التفضيلات</h3>
                <div class="toggle-row">
                    <div class="toggle-info">
                        <h4 data-i18n="email_orders">استقبال الطلبات بالبريد</h4>
                        <p data-i18n="email_orders_desc">ستتلقى إشعاراً بالبريد عند كل طلب جديد</p>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div style="text-align:center;margin-top:8px;">
                <button type="submit" class="btn-save" data-i18n="save_settings">حفظ الإعدادات</button>
            </div>
        </form>
    </main>

    <script src="../../js/app.js"></script>
    <script src="../../js/i18n.js"></script>
    <script>
        document.getElementById('logoUpload').addEventListener('click', function() { document.getElementById('logoInput').click(); });
        document.getElementById('storeSettingsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('تم حفظ الإعدادات بنجاح!');
        });
    </script>
</body>
</html>

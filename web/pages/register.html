<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="إنشاء حساب جديد - Luxora Marketplace">
  <title>إنشاء حساب | Luxora Marketplace</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="recaptcha-gate" id="recaptchaGate">
  <div class="recaptcha-box">
    <div class="rc-crown">👑</div>
    <h2><span class="gold">Luxora</span> Marketplace</h2>
    <p data-i18n="captcha.subtitle">يرجى التحقق أنك لست روبوت للدخول إلى المتجر</p>
    <label class="rc-check"><input type="checkbox" id="recaptchaCheck"><span data-i18n="captcha.label">لست روبوت</span></label><br>
    <button class="btn btn-gold" id="recaptchaSubmit" data-i18n="captcha.verify">تحقق والدخول</button>
  </div>
</div>

<header class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo"><span class="crown">👑</span><span class="logo-text"><span class="logo-name">Luxora</span><span class="logo-sub">Marketplace</span></span></a>
    <nav class="nav-links" id="navLinks">
      <a href="../index.html" data-i18n="nav.home">الرئيسية</a><a href="categories.html" data-i18n="nav.categories">الفئات</a><a href="products.html?sort=best" data-i18n="nav.bestsellers">أفضل مبيعاً</a><a href="products.html?sort=deals" data-i18n="nav.deals">العروض</a><a href="products.html" data-i18n="nav.brands">العلامات التجارية</a><a href="seller/dashboard.html" data-i18n="nav.stores">المتاجر</a><a href="become-seller.html" data-i18n="nav.sell">تبيع معنا</a>
    </nav>
    <div class="nav-search"><div class="nav-search-box"><input type="text" id="navSearch" placeholder="ابحث عن منتجات..."><button class="search-btn">🔍</button></div><div class="search-dropdown" id="searchDropdown"></div></div>
    <div class="nav-actions">
      <button class="nav-icon" id="langToggle" title="EN">🌐</button>
      <button class="nav-icon" id="themeToggle" title="Theme">🌙</button>
      <a href="wishlist.html" class="nav-icon">❤️</a>
      <a href="cart.html" class="nav-icon" id="cartIconBtn">🛒<span class="count" id="cartCount">0</span></a>
      <div class="user-dropdown" id="userDropdown"><div class="nav-user" id="userBtn"><div class="avatar" id="userAvatar">👤</div><span class="u-name" id="userName"></span></div><div class="dropdown-menu" id="userMenu"></div></div>
    </div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="../index.html">الرئيسية</a><a href="categories.html">الفئات</a><a href="products.html">المنتجات</a><a href="cart.html">سلة التسوق</a><a href="wishlist.html">المفضلة</a><a href="orders.html">طلباتي</a><a href="become-seller.html">تبيع معنا</a>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="crown">👑</div>
      <h2><span>Luxora</span> Marketplace</h2>
    </div>
    <h3 class="auth-title" data-i18n="register.title">إنشاء حساب جديد</h3>

    <form>
      <div class="form-group">
        <label class="form-label" data-i18n="form.name">الاسم الكامل</label>
        <input type="text" class="form-input" placeholder="محمد أحمد" data-i18n-placeholder="form.namePlaceholder">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="form.email">البريد الإلكتروني</label>
        <input type="email" class="form-input" placeholder="email@example.com" data-i18n-placeholder="form.emailPlaceholder">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="form.phone">رقم الجوال</label>
        <input type="tel" class="form-input" placeholder="05XXXXXXXX" data-i18n-placeholder="form.phonePlaceholder">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="form.password">كلمة المرور</label>
        <input type="password" class="form-input" placeholder="••••••••" data-i18n-placeholder="form.passwordPlaceholder">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="form.confirmPassword">تأكيد كلمة المرور</label>
        <input type="password" class="form-input" placeholder="••••••••" data-i18n-placeholder="form.confirmPasswordPlaceholder">
      </div>
      <label class="form-check" style="margin-bottom:20px">
        <input type="checkbox">
        <span data-i18n="register.agree">أوافق على <a href="#" class="text-gold">الشروط والأحكام</a> و<a href="#" class="text-gold">سياسة الخصوصية</a></span>
      </label>
      <button type="submit" class="btn btn-gold btn-block btn-lg" data-i18n="register.submit">إنشاء الحساب</button>
    </form>

    <div class="auth-divider" data-i18n="login.or">أو</div>

    <button class="social-btn">🔵 <span data-i18n="login.google">التسجيل بـ Google</span></button>
    <button class="social-btn">🔷 <span data-i18n="login.facebook">التسجيل بـ Facebook</span></button>

    <div class="auth-footer">
      <span data-i18n="register.hasAccount">لديك حساب بالفعل؟</span>
      <a href="login.html" data-i18n="register.login">تسجيل الدخول</a>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
</body>
</html>
